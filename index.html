<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Campus Web AR - UCEVA</title>
    <style>
        /* Reset para que nada se mueva */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Contenedor que ocupa toda la pantalla del celular */
        #unity-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #unity-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* Header UCEVA: Fijo arriba y centrado */
        #header-uceva {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none; /* No interfiere con los toques en el 3D */
        }

        .linea1 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            color: white;
            margin: 0;
        }

        .linea2 {
            font-size: 18px;
            font-weight: 700;
            color: #eee;
            margin: 2px 0;
        }

        .linea3 {
            font-size: 12px;
            color: #ccc;
            letter-spacing: 1px;
        }

        /* Instrucciones con Glassmorphism (Difuminado) */
        #overlay-instrucciones {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 500;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: opacity 0.5s ease;
        }

        #modal-instrucciones {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 85%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        #btn-cerrar-inst {
            background: #007f2f;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        /* BOTÓN AR: SIEMPRE CENTRADO SOBRE EL APP */
        #enterar {
            position: absolute;
            bottom: 10%; /* Se mantiene al 10% del borde inferior del APP */
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            width: auto; /* Dinámico al texto AR */
            background: #8d8d8d; /* Color gris por defecto */
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            font-size: 22px;
            z-index: 200;
            display: none; /* Se muestra al cargar */
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        /* Barra de carga Verde UCEVA */
        #unity-loading-bar {
            position: absolute;
            bottom: 30%;
            width: 100%;
            text-align: center;
        }

        #unity-progress-bar-empty {
            width: 200px;
            height: 4px;
            background: #333;
            margin: auto;
            border-radius: 10px;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #007f2f;
        }

        /* Limpieza de interfaces molestas */
        #unity-footer, .webxr-checkbox, #unity-webxr-link {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="unity-container">
        <div id="header-uceva">
            <div class="linea1">CAMPUS WEB AR</div>
            <div class="linea2">UCEVA</div>
            <div class="linea3">CENTRO STEAM+</div>
        </div>

        <div id="overlay-instrucciones">
            <div id="modal-instrucciones">
                <h2 style="color:#007f2f; margin:0;">Instrucciones</h2>
                <p style="text-align:left; font-size:14px; line-height:1.6; color:white; margin:20px 0;">
                    • Permite el acceso a la cámara.<br>
                    • Mueve el celular para detectar el suelo.<br>
                    • Toca la pantalla para situar el campus.<br>
                    • Usa dos dedos para rotar y escalar.
                </p>
                <button id="btn-cerrar-inst">ENTENDIDO</button>
            </div>
        </div>

        <canvas id="unity-canvas"></canvas>
        <button id="enterar">AR</button>

        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
        </div>
    </div>

    <script>
        // 1. LÓGICA DE CIERRE DE INSTRUCCIONES
        const overlay = document.getElementById('overlay-instrucciones');
        function cerrar() {
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 500);
            }
        }
        setTimeout(cerrar, 5000); // Autocierre 5s
        document.getElementById('btn-cerrar-inst').onclick = cerrar;

        // 2. CONFIGURACIÓN DE CARGA UNITY
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/web.loader.js";
        var config = {
            dataUrl: buildUrl + "/web.data.unityweb",
            frameworkUrl: buildUrl + "/web.framework.js.unityweb",
            codeUrl: buildUrl + "/web.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "GERSON_CALDERON",
            productName: "CAMPUS_WEB",
            productVersion: "1.0",
        };

        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var enterARButton = document.getElementById('enterar');

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((instance) => {
                window.unityInstance = instance;
                loadingBar.style.display = "none";
                enterARButton.style.display = "block";
            });
        };
        document.body.appendChild(script);

        // 3. CAMBIO DE COLOR DINÁMICO DEL BOTÓN AR
        document.addEventListener('onARSupportedCheck', function (event) {
            if (event.detail.supported) {
                enterARButton.style.backgroundColor = "#007f2f"; // Verde si es compatible
                enterARButton.disabled = false;
            } else {
                enterARButton.style.backgroundColor = "#8d8d8d"; // Gris si no es compatible
                enterARButton.disabled = true;
            }
        }, false);

        enterARButton.addEventListener('click', function () {
            if (window.unityInstance) window.unityInstance.Module.WebXR.toggleAR();
        });
    </script>
</body>
</html>
