<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Web AR - UCEVA</title>
    <style>
        /* Configuración Base */
        body {
            margin: 0;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Header de 3 niveles solicitado */
        #header-uceva {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

            #header-uceva .linea1 {
                font-size: 24px;
                font-weight: 900;
                letter-spacing: 4px;
                margin: 0;
            }

            #header-uceva .linea2 {
                font-size: 18px;
                font-weight: 700;
                margin: 2px 0;
                color: #eee;
            }

            #header-uceva .linea3 {
                font-size: 14px;
                font-weight: 400;
                margin: 0;
                color: #aaa;
                letter-spacing: 1px;
            }

        /* Panel de Instrucciones (Splash Screen) */
        #overlay-instrucciones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 500; /* Por delante de todo */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: opacity 0.5s ease;
        }

        #modal-instrucciones {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 85%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

            #modal-instrucciones h2 {
                font-size: 22px;
                margin-top: 0;
                color: #007f2f;
            }

            #modal-instrucciones p {
                font-size: 14px;
                line-height: 1.5;
                margin: 20px 0;
                text-align: left;
            }

        #btn-cerrar-inst {
            background: #007f2f;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Botón AR Dinámico */
        #enterar {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            width: auto; /* Dinámico al contenido "AR" */
            background: #8d8d8d; /* Gris inicial */
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            display: none;
        }

        /* Barra de carga Verde */
        #unity-loading-bar {
            position: absolute;
            bottom: 20%;
            width: 100%;
            text-align: center;
            display: block;
        }

        #unity-progress-bar-empty {
            width: 200px;
            height: 4px;
            background: #333;
            margin: auto;
            border-radius: 5px;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #007f2f;
        }

        /* Limpieza de interfaz WebXR */
        #unity-footer, .webxr-checkbox, #unity-webxr-link {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <div id="header-uceva">
            <div class="linea1">CAMPUS WEB AR</div>
            <div class="linea2">UCEVA</div>
            <div class="linea3">CENTRO STEAM+</div>
        </div>

        <div id="overlay-instrucciones">
            <div id="modal-instrucciones">
                <h2>Instrucciones</h2>
                <p>
                    • Concede permiso de cámara.<br>
                    • Escanea el suelo moviendo el móvil.<br>
                    • Toca para situar el campus.<br>
                    • Usa dos dedos para rotar y escalar.
                </p>
                <button id="btn-cerrar-inst">ENTENDIDO</button>
                <div id="timer-text" style="font-size: 10px; margin-top: 10px; color: #888;">Se cerrará en 5 segundos...</div>
            </div>
        </div>

        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>

        <button id="enterar">AR</button>

        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <script>
        // FUNCIÓN PARA CERRAR INSTRUCCIONES
        function cerrarModal() {
            const overlay = document.getElementById('overlay-instrucciones');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 500);
            }
        }

        // Autocierre en 5 segundos
        setTimeout(cerrarModal, 5000);

        // Cierre manual por botón
        document.getElementById('btn-cerrar-inst').onclick = cerrarModal;

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/web.loader.js";
        var config = {
            dataUrl: buildUrl + "/web.data.unityweb",
            frameworkUrl: buildUrl + "/web.framework.js.unityweb",
            codeUrl: buildUrl + "/web.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "GERSON_CALDERON",
            productName: "CAMPUS_WEB",
            productVersion: "1.0",
        };

        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var enterARButton = document.getElementById('enterar');
        var unityInstance = null;

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((instance) => {
                unityInstance = instance;
                loadingBar.style.display = "none";
                enterARButton.style.display = "block";
            });
        };
        document.body.appendChild(script);
