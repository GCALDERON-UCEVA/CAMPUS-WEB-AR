<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Web AR - UCEVA</title>
    <style>
        /* Configuración Base */
        body {
            margin: 0;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Header de 3 niveles */
        #header-uceva {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

            #header-uceva .titulo-principal {
                font-size: 26px;
                font-weight: 900;
                letter-spacing: 4px;
                margin: 0;
            }

            #header-uceva .sub-uceva {
                font-size: 18px;
                font-weight: 600;
                margin: 5px 0 0 0;
                color: #eee;
            }

            #header-uceva .sub-steam {
                font-size: 14px;
                font-weight: 400;
                margin: 2px 0 0 0;
                color: #bbb;
                letter-spacing: 1px;
            }

        /* Panel de Instrucciones Difuminado */
        #overlay-instrucciones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(12px); /* Efecto difuminado */
            -webkit-backdrop-filter: blur(12px);
        }

        #modal-instrucciones {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 85%;
            max-width: 450px;
            padding: 35px;
            border-radius: 15px;
            text-align: center;
        }

            #modal-instrucciones h2 {
                font-size: 24px;
                margin-top: 0;
                border-bottom: 1px solid #007f2f;
                display: inline-block;
                padding-bottom: 8px;
            }

            #modal-instrucciones p {
                font-size: 15px;
                line-height: 1.6;
                margin: 20px 0;
                text-align: left;
            }

        #btn-cerrar-inst {
            background: #007f2f;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        /* Botón AR Dinámico y con Colores Específicos */
        #enterar {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            width: auto; /* Dinámico al texto */
            min-width: 80px;
            background: #8d8d8d; /* Gris por defecto (inactivo) */
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            z-index: 100;
            display: none; /* Se activa al cargar Unity */
            transition: background-color 0.3s ease;
        }

        /* Barra de carga personalizada */
        #unity-loading-bar {
            position: absolute;
            bottom: 25%;
            width: 100%;
            text-align: center;
            display: none;
        }

        #unity-progress-bar-empty {
            width: 250px;
            height: 6px;
            background: #333;
            margin: auto;
            border-radius: 10px;
            overflow: hidden;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #007f2f;
            transition: width 0.2s;
        }

        /* Ocultar elementos de debug de WebXR template */
        #unity-footer, .webxr-checkbox, #unity-webxr-link {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <div id="header-uceva">
            <div class="titulo-principal">CAMPUS WEB AR</div>
            <div class="sub-uceva">UCEVA</div>
            <div class="sub-steam">CENTRO STEAM+</div>
        </div>

        <div id="overlay-instrucciones">
            <div id="modal-instrucciones">
                <h2>Instrucciones</h2>
                <p>
                    • Concede permiso de cámara cuando se solicite.<br>
                    • Escanea una superficie plana (suelo o mesa).<br>
                    • Toca la pantalla para situar la maqueta.<br>
                    • Pellizca con dos dedos para escalar y rotar.
                </p>
                <button id="btn-cerrar-inst">ENTENDIDO</button>
            </div>
        </div>

        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>

        <button id="enterar">AR</button>

        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
            <p style="font-size: 12px; margin-top: 10px;">Cargando experiencia...</p>
        </div>
    </div>
