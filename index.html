<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Visualizador Campus AR | Laura Salinas</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        /* Estilos para limpiar la interfaz */
        body {
            background-color: #0f0f0f;
            overflow: hidden;
        }

        #unity-footer {
            background: rgba(0, 0, 0, 0.7) !important;
            backdrop-filter: blur(5px);
            height: 60px !important;
        }

        /* Ocultar logos innecesarios de Unity */
        #unity-webgl-logo, #unity-webxr-link {
            display: none !important;
        }

        #unity-build-title {
            color: white;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Estilo moderno para el botón AR */
        #enterar {
            position: absolute;
            bottom: 80px; /* Separado del borde */
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }

            #enterar:disabled {
                background: #333;
                color: #777;
                cursor: not-allowed;
            }

            #enterar:hover:not(:disabled) {
                background: #e0e0e0;
                transform: translateX(-50%) scale(1.05);
            }

        /* Ocultar VR si no lo vas a usar */
        #entervr {
            display: none;
        }

        /* Ajuste de la barra de carga */
        #unity-progress-bar-full {
            background: #ffffff !important;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <div id="unity-canvas-container" style="width: 100%; height: 100%;">
            <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>
        </div>

        <button id="enterar" disabled>INICIAR EXPERIENCIA AR</button>
        <button id="entervr" disabled>VR</button>

        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>

        <div id="unity-footer">
            <div id="unity-build-title">Campus Universitario - Arquitectura Digital</div>
        </div>
    </div>

    <script>
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/web.loader.js";
        var config = {
            dataUrl: buildUrl + "/web.data.unityweb",
            frameworkUrl: buildUrl + "/web.framework.js.unityweb",
            codeUrl: buildUrl + "/web.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "GERSON_CALDERON",
            productName: "CAMPUS_WEB",
            productVersion: "1.0",
        };

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var unityInstance = null;

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((instance) => {
                unityInstance = instance;
                loadingBar.style.display = "none";
            }).catch((message) => {
                alert("Error al cargar la maqueta: " + message);
            });
        };
        document.body.appendChild(script);

        let enterARButton = document.getElementById('enterar');
        let enterVRButton = document.getElementById('entervr');

        document.addEventListener('onARSupportedCheck', function (event) {
            enterARButton.disabled = !event.detail.supported;
            if (event.detail.supported) {
                enterARButton.innerHTML = "VER CAMPUS EN TU ESPACIO";
            } else {
                enterARButton.innerHTML = "AR NO SOPORTADO";
            }
        }, false);

        enterARButton.addEventListener('click', function (event) {
            unityInstance.Module.WebXR.toggleAR();
        }, false);
    </script>
</body>
</html>
