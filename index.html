<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Web AR - UCEVA</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Header UCEVA 3 niveles */
        #header-uceva {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            z-index: 100; /* Prioridad alta */
            pointer-events: none;
        }

        .linea1 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 4px;
            margin: 0;
        }

        .linea2 {
            font-size: 18px;
            font-weight: 700;
            margin: 2px 0;
            color: #eee;
        }

        .linea3 {
            font-size: 14px;
            font-weight: 400;
            margin: 0;
            color: #aaa;
            letter-spacing: 1px;
        }

        /* Pantalla de Instrucciones */
        #overlay-instrucciones {
            position: fixed; /* Fixed para asegurar que cubra todo */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999; /* Máxima prioridad */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #modal-instrucciones {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 85%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        #btn-cerrar-inst {
            background: #007f2f;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Botón AR */
        #enterar {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            background: #8d8d8d; /* Gris por defecto */
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 900;
            font-size: 22px;
            z-index: 200;
            display: none; /* Se activa tras carga */
        }

        /* Barra de carga */
        #unity-loading-bar {
            position: absolute;
            bottom: 20%;
            width: 100%;
            text-align: center;
            z-index: 50;
        }

        #unity-progress-bar-empty {
            width: 200px;
            height: 5px;
            background: #333;
            margin: auto;
            border-radius: 10px;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #007f2f;
            transition: width 0.2s;
        }

        /* Limpieza visual de logos */
        #unity-footer, .webxr-checkbox, #unity-webxr-link {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="header-uceva">
        <div class="linea1">CAMPUS WEB AR</div>
        <div class="linea2">UCEVA</div>
        <div class="linea3">CENTRO STEAM+</div>
    </div>

    <div id="overlay-instrucciones">
        <div id="modal-instrucciones">
            <h2 style="color:#007f2f; margin-top:0;">Instrucciones</h2>
            <p style="text-align:left; font-size:14px; line-height:1.6;">
                • Permite el uso de la cámara.<br>
                • Mueve el móvil para detectar el suelo.<br>
                • Toca para situar el campus.<br>
                • Usa dos dedos para rotar y escalar.
            </p>
            <button id="btn-cerrar-inst">ENTENDIDO</button>
            <p id="timer-msg" style="font-size:10px; color:#888; margin-top:10px;">Cerrando automáticamente...</p>
        </div>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas" style="width: 100%; height: 100%; background: #000;"></canvas>
        <button id="enterar">AR</button>
        <div id="unity-loading-bar">
            <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
        </div>
    </div>

    <script>
        // 1. LÓGICA DE CIERRE (FORZADA)
        const overlay = document.getElementById('overlay-instrucciones');
        const btnCerrar = document.getElementById('btn-cerrar-inst');

        function removerInstrucciones() {
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.visibility = 'hidden';
                    overlay.style.display = 'none';
                }, 500);
            }
        }

        // Autocierre en 5 segundos exactos
        setTimeout(removerInstrucciones, 5000);

        // Cierre manual
        btnCerrar.onclick = removerInstrucciones;

        // 2. CONFIGURACIÓN UNITY
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/web.loader.js";
        var config = {
            dataUrl: buildUrl + "/web.data.unityweb",
            frameworkUrl: buildUrl + "/web.framework.js.unityweb",
            codeUrl: buildUrl + "/web.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "GERSON_CALDERON",
            productName: "CAMPUS_WEB",
            productVersion: "1.0",
        };

        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var enterARButton = document.getElementById('enterar');
        var unityInstance = null;

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((instance) => {
                unityInstance = instance;
                loadingBar.style.display = "none";
                enterARButton.style.display = "block";
            }).catch((err) => { console.error(err); });
        };
        document.body.appendChild(script);

        // 3. LÓGICA DE BOTÓN AR DINÁMICO
        document.addEventListener('onARSupportedCheck', function (event) {
            if (event.detail.supported) {
                enterARButton.disabled = false;
                enterARButton.style.backgroundColor = "#007f2f"; // Verde
                enterARButton.style.cursor = "pointer";
            } else {
                enterARButton.disabled = true;
                enterARButton.style.backgroundColor = "#8d8d8d"; // Gris
                enterARButton.style.cursor = "not-allowed";
            }
        }, false);

        enterARButton.addEventListener('click', function () {
            if (unityInstance) unityInstance.Module.WebXR.toggleAR();
        });
    </script>
</body>
</html>
